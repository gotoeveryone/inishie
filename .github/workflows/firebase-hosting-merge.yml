name: Deploy to Firebase Hosting on merge
on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build_and_deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    env:
      VITE_DATABASE_URL: "${{ secrets.FIREBASE_DATABASE_URL }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.16"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Build
        run: npm ci && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_INISHIE_2AF82 }}"
          channelId: live
          projectId: ${{ secrets.FIREBASE_PROJECT }}


  notify:
    if: ${{ always() && (needs.build_and_deploy.result == 'success' || needs.build_and_deploy.result == 'failure') }}
    needs:
      - build_and_deploy
    runs-on: ubuntu-latest
    steps:
      - name: Notify to Slack
        uses: slackapi/slack-github-action@v3.0.3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "${{ needs.build_and_deploy.result == 'success' && ':white_check_mark: Deploy succeeded' || ':x: Deploy failed' }}"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "${{ needs.build_and_deploy.result == 'success' && ':white_check_mark: *Deploy succeeded*' || ':x: *Deploy failed*' }}"
              - type: section
                fields:
                  - type: mrkdwn
                    text: "*Repository:*\n<${{ github.server_url }}/${{ github.repository }}|${{ github.repository }}>"
              - type: actions
                elements:
                  - type: button
                    text:
                      type: plain_text
                      text: View workflow
                    url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    action_id: view_workflow
